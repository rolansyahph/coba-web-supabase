<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StockMaster — Inventori Modern</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; }
        .glass-card { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px); }
    </style>
</head>
<body class="p-4 md:p-8">

<div class="max-w-4xl mx-auto">
    <div class="flex items-center justify-between mb-8">
        <div>
            <h1 class="text-3xl font-bold text-slate-800 tracking-tight">📦 StockMaster</h1>
            <p class="text-slate-500 text-sm">Kelola inventori barang dengan cepat & mudah</p>
        </div>
        <div id="loadingStatus" class="hidden animate-spin h-5 w-5 border-2 border-emerald-500 border-t-transparent rounded-full"></div>
    </div>

    <div class="glass-card p-6 rounded-2xl shadow-sm border border-slate-200 mb-8">
        <div class="grid grid-cols-1 md:grid-cols-4 gap-4">
            <div class="md:col-span-2">
                <label class="block text-xs font-semibold text-slate-500 uppercase mb-1 ml-1">Nama Barang</label>
                <input type="text" id="nama" placeholder="Contoh: MacBook Pro M3" 
                    class="w-full px-4 py-2.5 rounded-xl border border-slate-200 focus:ring-2 focus:ring-emerald-500 focus:border-transparent outline-none transition-all">
            </div>
            <div>
                <label class="block text-xs font-semibold text-slate-500 uppercase mb-1 ml-1">Stok</label>
                <input type="number" id="stok" placeholder="0" 
                    class="w-full px-4 py-2.5 rounded-xl border border-slate-200 focus:ring-2 focus:ring-emerald-500 focus:border-transparent outline-none transition-all">
            </div>
            <div>
                <label class="block text-xs font-semibold text-slate-500 uppercase mb-1 ml-1">Harga (Rp)</label>
                <input type="number" id="harga" placeholder="0" 
                    class="w-full px-4 py-2.5 rounded-xl border border-slate-200 focus:ring-2 focus:ring-emerald-500 focus:border-transparent outline-none transition-all">
            </div>
        </div>
        <button onclick="tambahBarang()" id="btnAdd"
            class="mt-4 w-full bg-emerald-600 hover:bg-emerald-700 text-white font-semibold py-3 rounded-xl shadow-lg shadow-emerald-200 transition-all flex items-center justify-center gap-2 active:scale-[0.98]">
            <i data-lucide="plus-circle" class="w-5 h-5"></i> Simpan ke Database
        </button>
    </div>

    <div class="overflow-hidden bg-white rounded-2xl border border-slate-200 shadow-sm">
        <div class="overflow-x-auto">
            <table class="w-full text-left border-collapse">
                <thead>
                    <tr class="bg-slate-50/50">
                        <th class="p-4 text-xs font-bold text-slate-500 uppercase tracking-wider">Informasi Barang</th>
                        <th class="p-4 text-xs font-bold text-slate-500 uppercase tracking-wider text-center">Stok</th>
                        <th class="p-4 text-xs font-bold text-slate-500 uppercase tracking-wider">Harga Satuan</th>
                        <th class="p-4 text-xs font-bold text-slate-500 uppercase tracking-wider text-right">Aksi</th>
                    </tr>
                </thead>
                <tbody id="tabelBody" class="divide-y divide-slate-100">
                    </tbody>
            </table>
        </div>
    </div>
</div>

<script>
    // --- KONFIGURASI ---
    const SUPABASE_URL = 'https://epacbxtonqlpignxjgoz.supabase.co'; 
    const SUPABASE_KEY = 'sb_publishable__YYsMH4Lf9nFnI8tDrWAzA_DEH6IFsm'; 
    const client = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    // Initial Icons
    lucide.createIcons();

    // Utility Loading UI
    function toggleLoading(show) {
        document.getElementById('loadingStatus').classList.toggle('hidden', !show);
    }

    // 1. Ambil Data (READ)
    async function loadData() {
        toggleLoading(true);
        const { data, error } = await client
            .from('produk')
            .select('*')
            .order('id', { ascending: false });

        toggleLoading(false);
        if (error) console.error(error);
        else renderTabel(data);
    }

    // 2. Tambah Data (CREATE)
    async function tambahBarang() {
        const nama = document.getElementById('nama').value;
        const stok = document.getElementById('stok').value;
        const harga = document.getElementById('harga').value;

        if (!nama || !stok) return alert('Nama dan Stok wajib diisi!');

        toggleLoading(true);
        const { error } = await client
            .from('produk')
            .insert([{ nama_barang: nama, stok: parseInt(stok), harga: parseInt(harga) }]);

        toggleLoading(false);
        if (error) alert(error.message);
        else {
            resetForm();
            loadData();
        }
    }

    // 3. Edit Data (UPDATE)
    async function editBarang(id, namaLama, stokLama, hargaLama) {
        const namaBaru = prompt("Ubah Nama Barang:", namaLama);
        const stokBaru = prompt("Ubah Jumlah Stok:", stokLama);
        const hargaBaru = prompt("Ubah Harga:", hargaLama);

        if (namaBaru === null || stokBaru === null) return;

        toggleLoading(true);
        const { error } = await client
            .from('produk')
            .update({ 
                nama_barang: namaBaru, 
                stok: parseInt(stokBaru),
                harga: parseInt(hargaBaru) 
            })
            .eq('id', id);

        toggleLoading(false);
        if (error) alert(error.message);
        else loadData();
    }

    // 4. Hapus Data (DELETE)
    async function hapusBarang(id) {
        if (!confirm('Hapus barang ini secara permanen?')) return;

        toggleLoading(true);
        const { error } = await client
            .from('produk')
            .delete()
            .eq('id', id);

        toggleLoading(false);
        if (error) alert(error.message);
        else loadData();
    }

    function renderTabel(items) {
        const body = document.getElementById('tabelBody');
        body.innerHTML = '';

        if (items.length === 0) {
            body.innerHTML = `<tr><td colspan="4" class="p-8 text-center text-slate-400">Belum ada data barang.</td></tr>`;
            return;
        }

        items.forEach(item => {
            const row = `
                <tr class="hover:bg-slate-50 transition-colors group">
                    <td class="p-4">
                        <div class="font-semibold text-slate-700">${item.nama_barang}</div>
                        <div class="text-xs text-slate-400 md:hidden block">ID: #${item.id}</div>
                    </td>
                    <td class="p-4 text-center">
                        <span class="px-3 py-1 rounded-full text-xs font-medium ${item.stok < 5 ? 'bg-red-100 text-red-600' : 'bg-slate-100 text-slate-600'}">
                            ${item.stok} unit
                        </span>
                    </td>
                    <td class="p-4 font-medium text-slate-600">
                        Rp ${parseInt(item.harga).toLocaleString('id-ID')}
                    </td>
                    <td class="p-4 text-right">
                        <div class="flex justify-end gap-2">
                            <button onclick="editBarang(${item.id}, '${item.nama_barang}', ${item.stok}, ${item.harga})" 
                                class="p-2 text-amber-500 hover:bg-amber-50 rounded-lg transition-colors">
                                <i data-lucide="pencil" class="w-4 h-4"></i>
                            </button>
                            <button onclick="hapusBarang(${item.id})" 
                                class="p-2 text-red-500 hover:bg-red-50 rounded-lg transition-colors">
                                <i data-lucide="trash-2" class="w-4 h-4"></i>
                            </button>
                        </div>
                    </td>
                </tr>
            `;
            body.insertAdjacentHTML('beforeend', row);
        });
        lucide.createIcons(); // Refresh icons
    }

    function resetForm() {
        document.getElementById('nama').value = '';
        document.getElementById('stok').value = '';
        document.getElementById('harga').value = '';
    }

    loadData();
</script>

</body>
</html>
